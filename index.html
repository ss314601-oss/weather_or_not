<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 기상 예보 & 과거 비교</title>
    <!-- Leaflet 지도 CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="app-container">
        
        <!-- 상단 고정: 지도 및 검색 영역 -->
        <div class="header-section">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="도시 이름 검색 (예: 서울, 파리)">
                <button id="search-btn">🔍 검색</button>
                <button id="gps-btn">📍 내 위치</button>
            </div>
            <!-- 지도가 표시될 네모 공간 -->
            <div id="map"></div>
            <p id="location-text">위치: 서울 (기본값)</p>
        </div>

        <!-- 메인 메뉴 탭 (예보 vs 과거) -->
        <div class="main-tabs">
            <button class="main-tab-btn active" data-target="forecast-section">🔮 기상 모델 예보</button>
            <button class="main-tab-btn" data-target="history-section">📜 1~2년 전 과거 날씨</button>
        </div>

        <!-- 1. 예보 섹션 (기존 모델 비교) -->
        <div id="forecast-section" class="content-section active">
            <div class="sub-tabs">
                <button class="sub-tab-btn active" data-type="summary">종합(날씨)</button>
                <button class="sub-tab-btn" data-type="temp">온도</button>
                <button class="sub-tab-btn" data-type="rain">강수량</button>
            </div>
            <div class="table-wrapper">
                <table id="forecast-matrix">
                    <thead id="forecast-header"></thead>
                    <tbody id="forecast-body"></tbody>
                </table>
            </div>
        </div>

        <!-- 2. 과거 날씨 섹션 (신규) -->
        <div id="history-section" class="content-section">
            <p class="section-desc">선택하신 지역의 정확히 1년 전, 2년 전 오늘 날씨입니다.</p>
            <div class="table-wrapper">
                <table id="history-matrix">
                    <thead id="history-header"></thead>
                    <tbody id="history-body"></tbody>
                </table>
            </div>
        </div>

    </div>

    <!-- Leaflet 지도 JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
