<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>날씨 비교 앱</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="header-section">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="도시 검색 (예: 서울, 파리)">
                <button id="search-btn">🔍</button>
                <button id="gps-btn">📍</button>
            </div>
            <div id="map"></div>
            <p id="location-text">위치: 서울</p>
        </div>

        <div class="main-tabs">
            <button class="main-tab-btn active" data-target="forecast-section">🔮 주간 예보</button>
            <button class="main-tab-btn" data-target="history-section">📜 과거 기록</button>
        </div>

        <div id="forecast-section" class="content-section active">
            <div class="table-wrapper">
                <table id="forecast-matrix">
                    <thead id="forecast-header"></thead>
                    <tbody id="forecast-body"></tbody>
                </table>
            </div>
        </div>

        <div id="history-section" class="content-section">
            <div class="history-controls">
                <input type="date" id="history-date">
                <button id="history-search-btn">조회</button>
            </div>
            <div class="table-wrapper">
                <table id="history-matrix">
                    <thead><tr><th class="sticky-col">날짜</th><th>최고</th><th>최저</th><th>강수</th></tr></thead>
                    <tbody id="history-body"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
